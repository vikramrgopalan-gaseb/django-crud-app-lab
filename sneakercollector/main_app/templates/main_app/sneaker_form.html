{% extends 'base.html' %} 
{% load static %} 
{% block head %}
<link rel="stylesheet" href="{% static 'css/form.css' %}" />
{% endblock %} 
{% block content %}

<div class="page-header">
    {% if sneaker %}
        <h1>Edit {{ sneaker.name }}</h1>
    {% else %}
        <h1>Add a Sneaker</h1>
    {% endif %}
  <img src="{% static 'images/nerd-sneaker.svg' %}" alt="A sneaker using a computer" />
</div>

<form action="" method="post" class="form-container">
  {% csrf_token %}
  <table>
    {{ form.as_table }}
  </table>
  <button type="submit" class="btn submit">Submit!</button>
</form>

{% endblock %}
